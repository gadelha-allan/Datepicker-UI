<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datepicker UI Premium - Estático</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="datepicker-container">
        <div class="datepicker-header">
            <button class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <span class="current-month-year">Junho 2026</span>
            <button class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="weekdays">
            <div>Dom</div>
            <div>Seg</div>
            <div>Ter</div>
            <div>Qua</div>
            <div>Qui</div>
            <div>Sex</div>
            <div>Sáb</div>
        </div>

        <div class="days-grid">
            <span class="day prev-month">31</span>
            
            <span class="day">1</span>
            <span class="day">2</span>
            <span class="day">3</span>
            <span class="day">4</span>
            <span class="day">5</span>
            <span class="day">6</span>
            <span class="day">7</span>
            <span class="day">8</span>
            <span class="day">9</span>
            <span class="day font-medium">10</span>
            <span class="day">11</span>
            <span class="day">12</span>
            <span class="day">13</span>
            <span class="day">14</span>
            <span class="day">15</span>
            <span class="day">16</span>
            <span class="day">17</span>
            <span class="day">18</span>
            <span class="day">19</span>
            <span class="day">20</span>
            <span class="day">21</span>
            <span class="day">22</span>
            <span class="day">23</span>
            <span class="day">24</span>
            <span class="day">25</span>
            <span class="day selected">26</span>
            <span class="day today">27</span>
            <span class="day">28</span>
            <span class="day">29</span>
            <span class="day">30</span>

            <span class="day next-month">1</span>
            <span class="day next-month">2</span>
            <span class="day next-month">3</span>
            <span class="day next-month">4</span>
        </div>

        <div class="datepicker-footer">
            <button class="btn-clear">Limpar</button>
            <button class="btn-apply">Aplicar data</button>
        </div>
    </div>

</body>
</html>
